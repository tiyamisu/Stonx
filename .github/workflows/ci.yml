name: StonX CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Java Backend Build ──────────────────────────────────────
  build-java:
    name: Java Maven Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile -B

  # ── React Frontend Build ────────────────────────────────────
  build-frontend:
    name: React Vite Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: StockVaultSimulator/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: StockVaultSimulator/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build production bundle
        run: npm run build
